# Vouch - production stack for Ubuntu.
#
# Two services:
#   merchant-console - Next.js app with all /api routes (mock zg + in-memory feed)
#   nginx            - reverse proxy + HTTPS terminator (Let's Encrypt via certbot)
#
# Start:  docker compose -f deploy/docker-compose.yml up -d --build
# Logs:   docker compose -f deploy/docker-compose.yml logs -f
#
# Required env (set in .env at repo root):
#   VOUCH_DOMAIN=vouch.example.com
#   MERCHANT_ADDRESS=0x...               # shown in receipts (optional, demo-only)

services:
  merchant-console:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.merchant-console
    image: vouch-console:latest
    container_name: vouch-console
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - ZG_COMPUTE_MODE=mock
      - ZG_STORAGE_MODE=mock
      - MERCHANT_ADDRESS=${MERCHANT_ADDRESS:-0x0000000000000000000000000000000000000000}
    expose:
      - "3000"
    networks:
      - vouch

  nginx:
    image: nginx:alpine
    container_name: vouch-nginx
    restart: unless-stopped
    depends_on:
      - merchant-console
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/templates/vouch.conf.template:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    environment:
      - VOUCH_DOMAIN=${VOUCH_DOMAIN:-localhost}
    command: >
      /bin/sh -c "envsubst '$$VOUCH_DOMAIN' < /etc/nginx/templates/vouch.conf.template
                  > /etc/nginx/conf.d/default.conf
                  && exec nginx -g 'daemon off;'"
    networks:
      - vouch

networks:
  vouch:
    driver: bridge
