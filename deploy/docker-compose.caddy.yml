# Vouch - production stack for a host that ALREADY runs Caddy (e.g. this server).
#
# Unlike deploy/docker-compose.yml, this variant does NOT start its own nginx and
# does NOT bind :80/:443 (the host Caddy already owns those). It runs only the
# Next.js console on a loopback-only port; the host Caddy reverse-proxies
# vouch.unitynodes.com -> 127.0.0.1:3060 and terminates TLS with the existing
# Cloudflare origin certificate.
#
# Start:  docker compose -f deploy/docker-compose.caddy.yml --env-file .env up -d --build
# Logs:   docker compose -f deploy/docker-compose.caddy.yml logs -f
# Stop:   docker compose -f deploy/docker-compose.caddy.yml down
#
# Caddy site block (add to /etc/caddy/Caddyfile, then `caddy reload`):
#   vouch.unitynodes.com {
#       encode gzip
#       import nextjs_headers
#       tls /etc/ssl/cf-origin-unitynodes.pem /etc/ssl/cf-origin-unitynodes-key.pem
#       reverse_proxy localhost:3060
#   }

services:
  merchant-console:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.merchant-console
    image: vouch-console:latest
    container_name: vouch-console
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - ZG_COMPUTE_MODE=mock
      - ZG_STORAGE_MODE=mock
      - MERCHANT_ADDRESS=${MERCHANT_ADDRESS:-0x0000000000000000000000000000000000000000}
    ports:
      # loopback only - exposed to the public solely through host Caddy
      - "127.0.0.1:3060:3000"
