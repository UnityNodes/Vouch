# Vouch nginx reverse proxy (Ubuntu prod).
#
# Two server blocks:
#   :80  - HTTP, serves ACME challenge + 301 → HTTPS once cert is provisioned
#   :443 - HTTPS, proxies / to merchant-console:3000
#
# Domain pulled from $VOUCH_DOMAIN env at container start via envsubst.
# Place this file at deploy/nginx.conf - docker-compose mounts it as a template.

server {
    listen 80;
    listen [::]:80;
    server_name ${VOUCH_DOMAIN};

    # ACME challenge for Let's Encrypt - keep this BEFORE the redirect.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → force HTTPS once cert exists; if not yet, proxy through.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ${VOUCH_DOMAIN};

    # certbot creates these on first issue:
    ssl_certificate     /etc/letsencrypt/live/${VOUCH_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${VOUCH_DOMAIN}/privkey.pem;

    # modern Mozilla config
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 5m;

    location / {
        proxy_pass http://merchant-console:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
}
